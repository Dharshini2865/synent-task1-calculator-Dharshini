<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator — Synent Internship Task 1</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0f0f11;
    --surface:   #1a1a1f;
    --surface2:  #222228;
    --border:    rgba(255,255,255,0.07);
    --border2:   rgba(255,255,255,0.13);
    --text:      #f0eff4;
    --muted:     rgba(240,239,244,0.38);
    --accent:    #c8f04a;
    --accent-d:  #a8cc30;
    --op-bg:     #2a2a32;
    --op-text:   #a9a6ff;
    --danger:    #ff6b6b;
    --radius:    16px;
  }

  body {
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    padding: 2rem 1rem;
  }

  /* Subtle grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .page { position: relative; z-index: 1; width: 100%; max-width: 360px; }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.5rem;
    padding: 0 4px;
  }
  .brand {
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.12em;
    color: var(--muted);
    text-transform: uppercase;
  }
  .badge {
    font-size: 11px;
    font-weight: 500;
    background: rgba(200,240,74,0.12);
    color: var(--accent);
    border: 1px solid rgba(200,240,74,0.22);
    border-radius: 99px;
    padding: 3px 10px;
    letter-spacing: 0.05em;
  }

  /* Calculator body */
  .calc {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 24px;
    overflow: hidden;
  }

  /* Display */
  .display {
    padding: 2rem 1.5rem 1.25rem;
    min-height: 130px;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    align-items: flex-end;
    position: relative;
    border-bottom: 1px solid var(--border);
  }

  .history {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--muted);
    min-height: 20px;
    text-align: right;
    width: 100%;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    margin-bottom: 0.5rem;
    transition: opacity 0.2s;
  }

  .display-main {
    font-family: 'DM Mono', monospace;
    font-size: 48px;
    font-weight: 300;
    color: var(--text);
    text-align: right;
    width: 100%;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    transition: transform 0.1s, color 0.2s;
    line-height: 1;
  }

  .display-main.error {
    color: var(--danger);
    font-size: 22px;
    padding-top: 8px;
  }

  .display-main.flash {
    transform: scale(1.04);
  }

  /* Mode indicator */
  .mode-row {
    display: flex;
    gap: 6px;
    margin-top: 0.75rem;
  }
  .mode-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--border2);
    transition: background 0.2s;
  }
  .mode-dot.active { background: var(--accent); }

  /* Button grid */
  .btn-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1px;
    background: var(--border);
    padding: 1px;
  }

  .btn {
    border: none;
    background: var(--surface);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 18px;
    font-weight: 400;
    height: 72px;
    cursor: pointer;
    transition: background 0.12s, transform 0.08s, color 0.12s;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .btn:hover { background: var(--surface2); }
  .btn:active { transform: scale(0.93); background: #2e2e38; }

  /* Ripple */
  .btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle, rgba(255,255,255,0.12) 0%, transparent 70%);
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }
  .btn:active::after { opacity: 1; }

  .btn.fn {
    background: var(--op-bg);
    color: var(--op-text);
    font-size: 14px;
    font-weight: 500;
  }
  .btn.fn:hover { background: #32323e; }

  .btn.op {
    background: var(--surface);
    color: var(--accent);
    font-size: 22px;
    font-weight: 300;
  }
  .btn.op:hover { background: rgba(200,240,74,0.06); }
  .btn.op.active-op { background: rgba(200,240,74,0.1); color: var(--accent-d); }

  .btn.eq {
    background: var(--accent);
    color: #1a1f0a;
    font-size: 22px;
    font-weight: 500;
  }
  .btn.eq:hover { background: var(--accent-d); }
  .btn.eq:active { background: #90b025; }

  .btn.zero { grid-column: span 2; justify-content: flex-start; padding-left: 28px; }

  /* Bottom bar */
  .bottom-bar {
    padding: 0.75rem 1.5rem;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .calc-label {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.08em;
    font-weight: 500;
  }
  .history-btn {
    font-size: 11px;
    color: var(--muted);
    background: none;
    border: 1px solid var(--border2);
    border-radius: 6px;
    padding: 3px 8px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: color 0.15s, border-color 0.15s;
  }
  .history-btn:hover { color: var(--text); border-color: var(--border2); }

  /* History panel */
  .hist-panel {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 16px;
    margin-top: 1rem;
    overflow: hidden;
    max-height: 0;
    transition: max-height 0.3s ease, opacity 0.3s;
    opacity: 0;
  }
  .hist-panel.open { max-height: 240px; opacity: 1; }
  .hist-inner { padding: 1rem 1.25rem; max-height: 220px; overflow-y: auto; }
  .hist-title { font-size: 11px; font-weight: 500; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 0.75rem; }
  .hist-item {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--text);
    padding: 6px 0;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .hist-item:last-child { border-bottom: none; }
  .hist-expr { color: var(--muted); font-size: 12px; }
  .hist-result { color: var(--accent); font-weight: 500; }
  .hist-empty { font-size: 13px; color: var(--muted); text-align: center; padding: 1rem 0; }

  /* Footer */
  .footer {
    margin-top: 1.5rem;
    text-align: center;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  /* Keyboard shortcut hint */
  .kb-hint {
    margin-top: 0.5rem;
    text-align: center;
    font-size: 11px;
    color: rgba(240,239,244,0.2);
  }
</style>
</head>
<body>

<div class="page">
  <div class="header">
    <span class="brand">Synent Technologies</span>
    <span class="badge">Task 1</span>
  </div>

  <div class="calc">
    <div class="display">
      <div class="history" id="history"></div>
      <div class="display-main" id="display">0</div>
      <div class="mode-row">
        <div class="mode-dot active" id="d0"></div>
        <div class="mode-dot" id="d1"></div>
        <div class="mode-dot" id="d2"></div>
        <div class="mode-dot" id="d3"></div>
      </div>
    </div>

    <div class="btn-grid">
      <button class="btn fn" onclick="ac()" id="ac-btn">AC</button>
      <button class="btn fn" onclick="sign()">+/−</button>
      <button class="btn fn" onclick="percent()">%</button>
      <button class="btn op" onclick="setOp('/')" id="op-div">÷</button>

      <button class="btn" onclick="num('7')">7</button>
      <button class="btn" onclick="num('8')">8</button>
      <button class="btn" onclick="num('9')">9</button>
      <button class="btn op" onclick="setOp('*')" id="op-mul">×</button>

      <button class="btn" onclick="num('4')">4</button>
      <button class="btn" onclick="num('5')">5</button>
      <button class="btn" onclick="num('6')">6</button>
      <button class="btn op" onclick="setOp('-')" id="op-sub">−</button>

      <button class="btn" onclick="num('1')">1</button>
      <button class="btn" onclick="num('2')">2</button>
      <button class="btn" onclick="num('3')">3</button>
      <button class="btn op" onclick="setOp('+')" id="op-add">+</button>

      <button class="btn zero" onclick="num('0')">0</button>
      <button class="btn" onclick="dot()">.</button>
      <button class="btn eq" onclick="eq()">=</button>
    </div>

    <div class="bottom-bar">
      <span class="calc-label">Simple Calculator</span>
      <button class="history-btn" onclick="toggleHistory()">History</button>
    </div>
  </div>

  <div class="hist-panel" id="hist-panel">
    <div class="hist-inner">
      <div class="hist-title">Calculation history</div>
      <div id="hist-list"><div class="hist-empty">No calculations yet</div></div>
    </div>
  </div>

  <div class="footer">Built with Python Internship · Synent Technologies 2025</div>
  <div class="kb-hint">Supports keyboard input</div>
</div>

<script>
  var cur = '0', prev = '', oper = null, fresh = false, justCalc = false;
  var histData = [];
  var opMap = { '+': 'op-add', '-': 'op-sub', '*': 'op-mul', '/': 'op-div' };
  var symMap = { '+': '+', '-': '−', '*': '×', '/': '÷' };
  var opDots = [0, 0, 0, 0]; // track which mode dot

  function fmt(n) {
    if (!isFinite(n)) return 'Error';
    var s = parseFloat(n.toPrecision(12)).toString();
    if (s.length > 14) s = n.toExponential(6);
    return s;
  }

  function upd(flash) {
    var el = document.getElementById('display');
    el.className = 'display-main';
    if (cur === 'Error') {
      el.textContent = 'Cannot divide by 0';
      el.classList.add('error');
    } else {
      el.textContent = cur;
    }
    if (flash) {
      el.classList.add('flash');
      setTimeout(function(){ el.classList.remove('flash'); }, 120);
    }
    // AC vs C
    document.getElementById('ac-btn').textContent = (cur !== '0' && cur !== 'Error') ? 'C' : 'AC';
  }

  function clearOpHighlight() {
    ['op-add','op-sub','op-mul','op-div'].forEach(function(id){
      var b = document.getElementById(id);
      if(b) b.classList.remove('active-op');
    });
  }

  function num(d) {
    if (cur === 'Error') return;
    if (fresh || justCalc) { cur = d; fresh = false; justCalc = false; clearOpHighlight(); }
    else cur = (cur === '0') ? d : cur + d;
    if (cur.length > 14) return;
    upd();
  }

  function dot() {
    if (cur === 'Error') return;
    if (fresh || justCalc) { cur = '0.'; fresh = false; justCalc = false; }
    else if (!cur.includes('.')) cur += '.';
    upd();
  }

  function ac() {
    if (cur !== '0' && cur !== 'Error' && !fresh) { cur = '0'; upd(); return; }
    cur = '0'; prev = ''; oper = null; fresh = false; justCalc = false;
    document.getElementById('history').textContent = '';
    clearOpHighlight();
    upd();
  }

  function sign() {
    if (cur === 'Error' || cur === '0') return;
    cur = String(parseFloat(cur) * -1);
    upd();
  }

  function percent() {
    if (cur === 'Error') return;
    cur = String(parseFloat(cur) / 100);
    upd();
  }

  function setOp(o) {
    if (cur === 'Error') return;
    if (oper && !fresh && !justCalc) calc(true);
    prev = cur; oper = o; fresh = true; justCalc = false;
    document.getElementById('history').textContent = prev + ' ' + symMap[o];
    clearOpHighlight();
    var btn = document.getElementById(opMap[o]);
    if (btn) btn.classList.add('active-op');
    // Mode dots
    var idx = ['+','-','*','/'].indexOf(o);
    for(var i=0;i<4;i++) document.getElementById('d'+i).className = 'mode-dot' + (i<=idx?' active':'');
  }

  function calc(chain) {
    if (!oper || prev === '') return;
    var a = parseFloat(prev), b = parseFloat(cur);
    var r, expr = prev + ' ' + symMap[oper] + ' ' + cur + ' =';
    if (oper === '+') r = a + b;
    else if (oper === '-') r = a - b;
    else if (oper === '*') r = a * b;
    else if (oper === '/') r = (b === 0) ? null : a / b;
    document.getElementById('history').textContent = expr;
    if (r === null) {
      cur = 'Error';
    } else {
      var result = fmt(r);
      if (!chain) {
        histData.unshift({ expr: prev + ' ' + symMap[oper] + ' ' + cur, result: result });
        if (histData.length > 20) histData.pop();
        renderHist();
      }
      cur = result;
    }
    if (!chain) { oper = null; prev = ''; justCalc = true; clearOpHighlight(); }
    upd(true);
    for(var i=0;i<4;i++) document.getElementById('d'+i).className = 'mode-dot' + (i===0?' active':'');
  }

  function eq() { calc(false); }

  function toggleHistory() {
    var p = document.getElementById('hist-panel');
    p.classList.toggle('open');
  }

  function renderHist() {
    var el = document.getElementById('hist-list');
    if (histData.length === 0) { el.innerHTML = '<div class="hist-empty">No calculations yet</div>'; return; }
    el.innerHTML = histData.map(function(h){
      return '<div class="hist-item"><span class="hist-expr">'+h.expr+'</span><span class="hist-result">'+h.result+'</span></div>';
    }).join('');
  }

  // Keyboard support
  document.addEventListener('keydown', function(e) {
    if (e.key >= '0' && e.key <= '9') num(e.key);
    else if (e.key === '.') dot();
    else if (e.key === '+') setOp('+');
    else if (e.key === '-') setOp('-');
    else if (e.key === '*') setOp('*');
    else if (e.key === '/') { e.preventDefault(); setOp('/'); }
    else if (e.key === 'Enter' || e.key === '=') eq();
    else if (e.key === 'Backspace') {
      if (cur.length > 1 && cur !== 'Error') { cur = cur.slice(0,-1); upd(); }
      else { cur = '0'; upd(); }
    }
    else if (e.key === 'Escape') ac();
    else if (e.key === '%') percent();
  });
</script>
</body>
</html>
